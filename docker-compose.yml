services:
  # --- PHP CLI (your "test runner" container) ---
  php:
    build:
      context: ./php
      args:
        UID: ${HOST_UID:-1000}
    container_name: fooino-php
    volumes:
      - ../packages:/var/www/packages   # all packages visible inside
    networks:
      - fooino-net

  # --- MySQL ---
  mysql:
    image: mysql:8.0
    container_name: fooino-mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret_root_pw
    ports:
      - "3307:3306"          # use 3307 on host to avoid conflicts
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fooino-net

  # --- Redis ---
  redis:
    image: redis:alpine
    container_name: fooino-redis
    ports:
      - "6380:6379"          # use 6380 on host
    networks:
      - fooino-net

volumes:
  mysql_data:

networks:
  fooino-net:
    driver: bridge